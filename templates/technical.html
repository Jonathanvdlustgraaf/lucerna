<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            color: #1c1917;
            background: white;
            line-height: 1.75;
            font-size: 14px;
        }

        /* ── Title page (left-aligned, no centering) ── */
        .title-page {
            padding: 60px 48px 40px;
            border-bottom: 2px solid #1c1917;
            margin-bottom: 0;
            page-break-after: always;
        }
        .title-page .doc-type {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #78716c;
            margin-bottom: 16px;
        }
        .title-page h1 {
            font-family: 'Sora', sans-serif;
            font-size: 30px;
            font-weight: 700;
            color: #1c1917;
            margin-bottom: 24px;
            line-height: 1.3;
        }
        .title-page .meta-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 6px 0;
            font-size: 13px;
        }
        .title-page .meta-key   { color: #78716c; }
        .title-page .meta-value { color: #1c1917; font-weight: 500; }

        /* ── Inhoudsopgave (optional) ── */
        .toc {
            padding: 40px 48px;
            page-break-after: always;
        }
        .toc h2 {
            font-family: 'Sora', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-size: 13px;
            color: #57534e;
        }
        .toc-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px dotted #e7e5e4;
            font-size: 13px;
        }

        /* ── Body ── */
        .body-content { padding: 40px 48px; }
        .body-content h1 {
            font-family: 'Sora', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin: 24px 0 12px;
        }
        .body-content h2 {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 600;
            margin: 24px 0 10px;
            padding-top: 12px;
            border-top: 1px solid #e7e5e4;
            page-break-before: always;
        }
        .body-content h3 {
            font-family: 'Sora', sans-serif;
            font-size: 16px;
            font-weight: 600;
            margin: 16px 0 8px;
        }
        .body-content p  { margin-bottom: 12px; }
        .body-content li { margin-left: 24px; margin-bottom: 4px; }
        .body-content blockquote {
            border-left: 4px solid #e7e5e4;
            padding-left: 16px;
            color: #78716c;
            margin: 12px 0;
        }

        /* ── Code — monospace ── */
        .body-content code {
            font-family: 'Courier New', Courier, monospace;
            background: #f5f5f4;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        .body-content pre {
            font-family: 'Courier New', Courier, monospace;
            background: #1c1917;
            color: #f5f5f4;
            padding: 20px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 16px;
            font-size: 12px;
            line-height: 1.6;
        }
        .body-content pre code {
            background: none;
            color: inherit;
            padding: 0;
            font-size: inherit;
        }

        /* ── Tables with alternating rows ── */
        .body-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 16px;
            font-size: 13px;
        }
        .body-content thead {
            background: #1c1917;
            color: white;
        }
        .body-content thead th {
            padding: 8px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.04em;
        }
        .body-content tbody tr:nth-child(even) {
            background: #f5f5f4;
        }
        .body-content tbody tr:nth-child(odd) {
            background: white;
        }
        .body-content tbody td {
            padding: 7px 12px;
            border-bottom: 1px solid #e7e5e4;
            vertical-align: top;
        }
        .body-content tbody tr:last-child td {
            border-bottom: none;
        }

        .page-break { page-break-before: always; }

        /* ── Print ── */
        @media print {
            body { font-size: 12px; }
            .title-page { padding: 40px 40px 32px; }
            @page { margin: 2cm 2.5cm; }
            @page :left  { margin-left: 3cm; }
            @page :right { margin-right: 3cm; }
        }
    </style>
</head>
<body>
    <div class="title-page">
        <p class="doc-type">Technical Report</p>
        <h1>{{title}}</h1>
        <div class="meta-grid">
            <span class="meta-key">Author</span>
            <span class="meta-value">{{author}}</span>
            <span class="meta-key">Date</span>
            <span class="meta-value">{{date}}</span>
        </div>
    </div>

    <div class="toc">
        <h2>Contents</h2>
        {{toc}}
    </div>

    <div class="body-content">
        {{body}}
    </div>
</body>
</html>
